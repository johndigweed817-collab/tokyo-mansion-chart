<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Action Fractal: Cycle of Life</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 20px; left: 20px;
            color: #fff; background: rgba(0, 0, 0, 0.8);
            padding: 15px; border-radius: 8px; border: 1px solid #ff4400;
            max-width: 320px; pointer-events: none;
        }
        h1 { font-size: 1.2rem; margin: 0 0 10px 0; color: #ff4400; }
        p { font-size: 0.8rem; line-height: 1.5; color: #ccc; margin: 5px 0; }
    </style>
</head>
<body>

<div id="ui">
    <h1>Action Fractal: Life Cycle</h1>
    <p>・5回移動で「子」を生成（計3回まで）</p>
    <p>・4回目の出産機会で「爆発・消滅」</p>
    <p>・個体の死と生のループを視覚化</p>
</div>

<canvas id="c"></canvas>

<script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    let w = canvas.width = window.innerWidth;
    let h = canvas.height = window.innerHeight;

    const mu = 1.5;
    const speed = 4;
    let agents = [];
    let particles = []; // 爆発演出用

    class Agent {
        constructor(x, y, color) {
            this.x = x;
            this.y = y;
            this.angle = Math.random() * Math.PI * 2;
            this.targetL = 0;
            this.currentL = 0;
            this.waitMax = 0;
            this.waitTime = 0;
            this.isMoving = false;
            this.color = color || `hsla(${Math.random() * 360}, 100%, 60%, 0.5)`;
            this.moveCount = 0; 
            this.spawnCount = 0; // 何回産んだか
            this.isDead = false;
            this.timer = 0;
            this.decideNext();
        }

        getLevy(min, max) {
            let val = 2 * Math.pow(Math.random(), -1 / (mu - 1));
            return Math.max(min, Math.min(val, max));
        }

        decideNext() {
            if (this.isMoving) {
                this.isMoving = false;
                this.waitMax = this.waitTime = this.getLevy(20, 300);
            } else {
                this.moveCount++;
                
                // 5回移動するごとにアクション
                if (this.moveCount >= 5) {
                    this.spawnCount++;
                    if (this.spawnCount >= 4) {
                        this.explode(); // 4回目で爆発
                        return;
                    } else {
                        this.spawnChild(); // 3回目までは子を産む
                    }
                    this.moveCount = 0;
                }

                this.isMoving = true;
                this.targetL = this.getLevy(10, w / 3);
                this.currentL = 0;
                this.angle = Math.random() * Math.PI * 2;
                this.color = `hsla(${Math.random() * 360}, 100%, 60%, 0.5)`;
            }
        }

        spawnChild() {
            agents.push(new Agent(this.x, this.y, this.color));
        }

        explode() {
            this.isDead = true;
            // 爆発パーティクルの生成
            for (let i = 0; i < 20; i++) {
                particles.push({
                    x: this.x,
                    y: this.y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 30,
                    color: this.color
                });
            }
        }

        update() {
            if (this.isDead) return;
            this.timer++;
            if (this.isMoving) {
                ctx.beginPath();
                ctx.strokeStyle = this.color;
                ctx.moveTo(this.x, this.y);
                this.x += Math.cos(this.angle) * speed;
                this.y += Math.sin(this.angle) * speed;
                this.currentL += speed;
                if (this.x < 0) this.x = w; if (this.x > w) this.x = 0;
                if (this.y < 0) this.y = h; if (this.y > h) this.y = 0;
                ctx.lineTo(this.x, this.y);
                ctx.stroke();
                if (this.currentL >= this.targetL) this.decideNext();
            } else {
                const progress = this.waitTime / this.waitMax;
                const pulse = Math.sin(this.timer * 0.15) * 0.5 + 0.5;
                const size = 1 + (10 * progress * pulse);
                ctx.fillStyle = this.color.replace('0.5)', (0.2 + pulse * 0.4) + ')');
                ctx.beginPath();
                ctx.arc(this.x, this.y, size, 0, Math.PI * 2);
                ctx.fill();
                this.waitTime--;
                if (this.waitTime <= 0) this.decideNext();
            }
        }
    }

    function init() {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, w, h);
        agents = [new Agent(w / 2, h / 2)];
        particles = [];
    }

    function loop() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.02)';
        ctx.fillRect(0, 0, w, h);

        // パーティクルの描画
        particles.forEach((p, i) => {
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
            ctx.fill();
            p.x += p.vx;
            p.y += p.vy;
            p.life--;
        });
        particles = particles.filter(p => p.life > 0);

        // エージェントの更新
        agents.forEach(a => a.update());
        agents = agents.filter(a => !a.isDead);

        requestAnimationFrame(loop);
    }

    window.addEventListener('click', init);
    init();
    loop();
</script>
</body>
</html>
