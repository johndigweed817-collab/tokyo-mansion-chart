<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashi Driven Simulator - Expert Logic</title>
    <style>
        :root { --bg: #fdfaf5; --accent: #d4a373; --error: #e63946; --text: #5d4037; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; color: var(--text); touch-action: manipulation; }
        .main-container { display: flex; flex-direction: column; align-items: center; width: 95%; max-width: 600px; gap: 15px; margin: 15px auto; padding-bottom: 50px; }

        /* アラート表示 */
        #alert-box { 
            width: 100%; display: none; background: #fff1f0; border: 1px solid var(--error); 
            color: var(--error); padding: 12px; border-radius: 12px; font-size: 13px; 
            font-weight: bold; margin-bottom: 10px; animation: shake 0.5s;
        }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }

        .method-selector { display: flex; gap: 8px; width: 100%; background: #eee; padding: 5px; border-radius: 30px; }
        .method-btn { flex: 1; padding: 10px; border-radius: 25px; border: none; font-size: 12px; font-weight: bold; cursor: pointer; background: transparent; color: #888; }
        .method-btn.active { background: #fff; color: var(--text); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        .palette { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; }
        .ing { padding: 10px 14px; background: #fff; border: 1px solid #ddd; border-radius: 12px; font-size: 13px; cursor: grab; }
        .ing.dragging { opacity: 0.6; transform: scale(1.1); z-index: 1000; position: fixed; pointer-events: none; border: 2px solid var(--accent); }

        .cooking-stage { display: flex; width: 100%; gap: 10px; }
        .pot-wrapper { position: relative; width: 180px; height: 180px; flex-shrink: 0; }
        .pot-svg { width: 100%; height: 100%; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.2)); }
        .inventory { flex-grow: 1; height: 180px; background: rgba(255,255,255,0.6); border-radius: 15px; padding: 10px; border: 1px dashed #ccc; overflow-y: auto; font-size: 11px; }

        .chart-card { background: #fff; width: 100%; padding: 20px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .explanation-card { background: #fff; width: 100%; padding: 20px; border-radius: 20px; border-left: 5px solid var(--accent); box-sizing: border-box; }
        .exp-section { margin-bottom: 12px; font-size: 13px; line-height: 1.5; }
        .exp-tag { font-weight: bold; color: var(--accent); font-size: 11px; display: block; margin-bottom: 2px; }
    </style>
</head>
<body>

<div class="main-container">
    <div id="alert-box">⚠️ 警告：不適切な調理法が検出されました</div>

    <div id="method-container" class="method-selector"></div>
    <div class="palette" id="palette-container"></div>

    <div class="cooking-stage">
        <div class="pot-wrapper">
            <svg class="pot-svg" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="48" fill="#333" />
                <circle cx="50" cy="50" r="44" fill="#555" />
                <circle cx="50" cy="50" r="0" id="water-vol" fill="#ffd700" opacity="0.6" />
            </svg>
            <div id="drop-zone" style="position:absolute; inset:0;"></div>
        </div>
        <div class="inventory" id="inv-list"></div>
    </div>

    <div class="chart-card">
        <canvas id="radar" width="300" height="300"></canvas>
    </div>

    <div class="explanation-card">
        <div id="explanation-container"></div>
    </div>

    <button style="margin-top:20px; border:none; background:none; color:#aaa; font-size:12px;" onclick="resetAll()">リセット</button>
</div>

<script>
/**
 * 体系化された「だし」データマスタ
 */
const DATA = {
    methods: {
        water: { id: "water", name: "水出し", emoji: "❄️", desc: "低温で雑味を抑える抽出法。" },
        simmer: { id: "simmer", name: "煮出し", emoji: "🔥", desc: "80℃前後でバランス良く抽出。" },
        express: { id: "express", name: "高温", emoji: "⚡", desc: "沸騰状態で一気に引き出す。" }
    },
    ingredients: {
        kombu: { id: "kombu", name: "昆布", icon: "🌿", glu: 3000, nuc: 0,
            eff: { water: 1.2, simmer: 1.0, express: 0.7 }, // 水出しが最も上品
            note: "昆布は低温でこそ澄んだ旨みが出ます。高温ではぬめり成分が流出します。" },
        katsuo: { id: "katsuo", name: "鰹節", icon: "🐟", glu: 50, nuc: 700,
            eff: { water: 0.4, simmer: 1.0, express: 1.2 }, // 熱が必要
            note: "節類は熱を加えることでイノシン酸が溶け出します。" },
        asari: { id: "asari", name: "あさり", icon: "🐚", glu: 100, nuc: 100,
            eff: { water: 0.05, simmer: 1.0, express: 1.5 }, // 水出しではほぼゼロ
            note: "貝類は加熱によるタンパク質収縮でコハク酸が放出されます。" }
    },
    warnings: [
        {
            check: (m, items) => m === 'water' && items.some(i => i.id === 'asari'),
            level: "ERROR",
            msg: "⚠️ 【衛生警告】生の貝類を水出しするのは非常に危険です。コハク酸も抽出されず、細菌繁殖のリスクが高まります。必ず加熱してください。"
        },
        {
            check: (m, items) => m === 'express' && items.some(i => i.id === 'kombu'),
            level: "CAUTION",
            msg: "⚠️ 【品質警告】昆布を高熱で煮立たせると、アルギン酸が溶け出し、だしに強い濁りとエグみが生じます。"
        }
    ]
};

let currentItems = [];
let activeMethodId = "water";
const canvas = document.getElementById('radar');
const ctx = canvas.getContext('2d');

function init() {
    const mc = document.getElementById('method-container');
    Object.values(DATA.methods).forEach(m => {
        const btn = document.createElement('button');
        btn.className = `method-btn ${m.id === activeMethodId ? 'active' : ''}`;
        btn.id = `btn-${m.id}`;
        btn.innerText = `${m.emoji} ${m.name}`;
        btn.onclick = () => { activeMethodId = m.id; update(); };
        mc.appendChild(btn);
    });

    const pc = document.getElementById('palette-container');
    Object.values(DATA.ingredients).forEach(i => {
        const div = document.createElement('div');
        div.className = 'ing'; div.innerText = `${i.icon} ${i.name}`;
        div.onmousedown = (e) => startDrag(e, i.id);
        div.ontouchstart = (e) => startDrag(e, i.id);
        pc.appendChild(div);
    });
    update();
}

function update() {
    // 1. メソッド切り替え
    document.querySelectorAll('.method-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`btn-${activeMethodId}`).classList.add('active');

    // 2. 警告チェック
    const alertBox = document.getElementById('alert-box');
    const activeWarnings = DATA.warnings.filter(w => w.check(activeMethodId, currentItems));
    if (activeWarnings.length > 0) {
        alertBox.style.display = 'block';
        alertBox.innerText = activeWarnings[0].msg;
        alertBox.style.borderColor = activeWarnings[0].level === "ERROR" ? "#e63946" : "#f4a261";
    } else {
        alertBox.style.display = 'none';
    }

    // 3. スコア計算（素材×抽出方法の係数を適用）
    let totalG = 0, totalN = 0, counts = {};
    currentItems.forEach(i => {
        const coeff = i.eff[activeMethodId];
        totalG += i.glu * coeff;
        totalN += i.nuc * coeff;
        counts[i.name] = (counts[i.name] || 0) + 1;
    });

    let boost = 1.0;
    if (totalG > 0 && totalN > 0) {
        boost = 1 + (Math.min(totalG, totalN) / Math.max(totalG, totalN) * 7.5);
    }

    // 4. 解説表示
    const exp = document.getElementById('explanation-container');
    exp.innerHTML = `<div class="exp-section"><span class="exp-tag">抽出解説</span>${DATA.methods[activeMethodId].desc}</div>`;
    [...new Set(currentItems.map(i=>i.id))].forEach(id => {
        exp.innerHTML += `<div class="exp-section"><span class="exp-tag">${DATA.ingredients[id].name}の状態</span>${DATA.ingredients[id].note}</div>`;
    });

    // 5. ビジュアル更新
    document.getElementById('inv-list').innerText = Object.entries(counts).map(([k,v])=>`${k}x${v}`).join(', ') || "空";
    document.getElementById('water-vol').setAttribute('r', currentItems.length ? 30 + currentItems.length * 2 : 0);
    
    drawRadar(totalG, totalN, boost);
}

// 簡易ドラッグ（デモ用）
function startDrag(e, id) {
    currentItems.push(DATA.ingredients[id]);
    update();
}

function resetAll() { currentItems = []; update(); }

function drawRadar(g, n, b) {
    ctx.clearRect(0,0,300,300);
    const center=150, radius=90, labels=["旨み", "複雑性", "依存度", "奥行き", "香り"];
    const s = [Math.min(100, (g+n)*b/150), Math.min(100, currentItems.length*15), 50, Math.min(100, n/5), 50];
    
    ctx.strokeStyle = "#eee";
    for(let j=1; j<=5; j++){
        ctx.beginPath();
        for(let i=0; i<5; i++){
            const a = (Math.PI*2/5)*i - Math.PI/2;
            ctx.lineTo(center+Math.cos(a)*radius*j/5, center+Math.sin(a)*radius*j/5);
        }
        ctx.closePath(); ctx.stroke();
    }
    ctx.fillStyle = "rgba(212, 163, 115, 0.5)"; ctx.beginPath();
    for(let i=0; i<5; i++){
        const a = (Math.PI*2/5)*i - Math.PI/2;
        ctx.lineTo(center+Math.cos(a)*(s[i]/100*radius), center+Math.sin(a)*(s[i]/100*radius));
    }
    ctx.fill();
}
init();
</script>
</body>
</html>
