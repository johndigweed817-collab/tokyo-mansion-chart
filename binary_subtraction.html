<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2進数マジック：引き算シミュレーター</title>
    <style>
        :root {
            --bg: #0f172a;
            --panel: #ffffff;
            --primary: #4f46e5;
            --accent-comp: #f59e0b;
            --accent-add: #10b981;
            --bit-on: #4f46e5;
            --bit-off: #e2e8f0;
            --negative-red: #ef4444;
        }

        body {
            font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
            background-color: var(--bg);
            margin: 0; padding: 10px;
            display: flex; flex-direction: column; align-items: center;
            overflow: hidden;
            touch-action: none;
        }

        header {
            width: 100%;
            max-width: 500px;
            text-align: center;
            margin-bottom: 10px;
        }
        header h1 {
            color: white;
            font-size: 1.4rem;
            margin: 10px 0;
            text-shadow: 0 0 10px var(--primary);
        }

        .board {
            width: 100%; max-width: 500px;
            background: var(--panel); padding: 25px 15px;
            border-radius: 30px; box-shadow: 0 10px 0 #334155, 0 20px 60px rgba(0,0,0,0.6);
            display: flex; flex-direction: column; gap: 15px;
            position: relative;
        }

        .io-row {
            display: grid;
            grid-template-columns: 40px 1fr 45px 90px;
            align-items: center; gap: 8px;
        }

        .label { font-weight: bold; color: #64748b; font-size: 0.9rem; text-align: center; }
        .bits-group { display: flex; gap: 4px; justify-content: center; perspective: 1000px; }
        
        .bit {
            width: 38px; height: 55px; background: var(--bit-off); border-radius: 8px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-weight: bold; cursor: pointer; position: relative;
            box-shadow: inset 0 -4px 0 rgba(0,0,0,0.1);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }
        .bit-val { font-size: 1.3rem; pointer-events: none; }
        .weight-label { font-size: 0.6rem; margin-top: 2px; opacity: 0.6; pointer-events: none; }

        .bit.active { background: var(--bit-on); color: white; }
        .bit.negative-active { background: var(--negative-red); color: white; border: 2px solid white; box-shadow: 0 0 10px var(--negative-red); }
        
        @keyframes magic-flip {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }
        .flipping { animation: magic-flip 0.5s ease-in-out; }

        .fixed-unit {
            width: 50px; height: 50px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 1.5rem; color: white; font-weight: bold;
            background: var(--accent-add); box-shadow: 0 4px 0 #059669;
        }

        .fixed-slot {
            width: 45px; height: 45px; border: 3px dashed #cbd5e1; border-radius: 12px;
            background: #fff; display: flex; justify-content: center; align-items: center;
            cursor: pointer; transition: 0.3s; font-size: 1.5rem;
            position: relative;
        }
        .fixed-slot.active { background: var(--accent-comp); border-style: solid; color: white; cursor: grab; }

        .lens {
            width: 85px; height: 85px; background: white;
            border: 4px solid #94a3b8; border-radius: 50%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); transition: 0.3s;
        }
        .lens-main { font-size: 1.5rem; font-weight: bold; color: var(--primary); }
        .lens-sub { font-size: 0.5rem; color: #94a3b8; font-weight: bold; }
        .lens.magic-on { border-color: var(--negative-red); background: #fef2f2; }

        .toolbox-area { display: flex; align-items: center; gap: 20px; margin-top: 20px; }
        .toolbox { display: flex; justify-content: center; align-items: center; background: #475569; padding: 15px 40px; border-radius: 50px; }
        .unit-draggable { width: 60px; height: 60px; border-radius: 20px; background: var(--accent-comp); display: flex; justify-content: center; align-items: center; color: white; font-size: 2rem; cursor: grab; touch-action: none; }
        .reset-btn { background: #ef4444; color: white; border: none; padding: 15px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 #991b1b; }

        .overflow-box {
            text-align: center;
            color: var(--negative-red);
            font-size: 0.75rem;
            font-weight: bold;
            height: 18px;
            margin-bottom: -10px;
            visibility: hidden;
        }
        .overflow-box.visible { visibility: visible; animation: blink 1s infinite; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .guide { 
            font-size: 0.82rem; 
            text-align: center; 
            color: #94a3b8; 
            margin-bottom: 8px; 
            font-weight: bold;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.3s ease;
            padding: 0 10px;
        }
        
        .dragging { position: fixed !important; pointer-events: none; z-index: 1000; opacity: 0.9; transform: scale(1.1); }
    </style>
</head>
<body>

    <header>
        <h1>2進数マジック　引き算シミュレーター</h1>
    </header>

    <div class="guide" id="guide"></div>

    <div class="board">
        <div class="io-row">
            <div class="label">A</div>
            <div class="bits-group" id="bits-a"></div>
            <div class="fixed-slot" id="slot-comp-a" data-target="a"></div>
            <div class="lens" id="lens-a"><div class="lens-main">0</div><div class="lens-sub">NORMAL</div></div>
        </div>
        <div style="display:flex; justify-content:center; margin: 5px 0;"><div class="fixed-unit">＋</div></div>
        <div class="io-row">
            <div class="label">B</div>
            <div class="bits-group" id="bits-b"></div>
            <div class="fixed-slot" id="slot-comp-b" data-target="b"></div>
            <div class="lens" id="lens-b"><div class="lens-main">0</div><div class="lens-sub">NORMAL</div></div>
        </div>
        
        <hr style="border:0; border-top:2px dashed #e2e8f0; margin:10px 0;">
        <div class="overflow-box" id="overflow-notice">⚠️ 4ビットの限界（あふれ）発生！</div>
        
        <div class="io-row">
            <div class="label">答え</div>
            <div class="bits-group" id="bits-res"></div>
            <div></div>
            <div class="lens" id="lens-res" style="border-color:var(--accent-add);"><div class="lens-main">0</div><div class="lens-sub">RESULT</div></div>
        </div>
    </div>

    <div class="toolbox-area">
        <div class="toolbox"><div class="unit-draggable" id="u-comp">🔄</div></div>
        <button class="reset-btn" id="btn-reset">リセット</button>
    </div>

    <script>
        const BITS = 4;
        let state = { a: { bits: [0,0,0,0], comp: false }, b: { bits: [0,0,0,0], comp: false } };

        const messages = [
            "このコンピューターは足し算が出来る。足し算しか出来ない…",
            "足し算しか出来ないコンピューターで引き算がなんて出来るのか！",
            "2進数の0と1、ビットを反転して+1すると元の数を負の数にできるらしいけど…",
            "🔄は2の補数器、これを使うとビット反転して+1してくれるらしい…"
        ];
        let msgIndex = 0;
        let msgTimer = null;
        let triggerTimeout = null;

        function setGuideMessage(text, isTriggered = false) {
            const guideEl = document.getElementById('guide');
            guideEl.style.opacity = 0;
            
            // すでにトリガー中のタイマーがあれば解除
            if (triggerTimeout) clearTimeout(triggerTimeout);
            if (isTriggered && msgTimer) clearInterval(msgTimer);

            setTimeout(() => {
                guideEl.textContent = text;
                guideEl.style.opacity = 1;
                
                // トリガーメッセージの場合は5秒後に通常のサイクルを再開
                if (isTriggered) {
                    triggerTimeout = setTimeout(() => {
                        startMessageCycle();
                    }, 10000);
                }
            }, 1000);
        }

        function startMessageCycle() {
            if (msgTimer) clearInterval(msgTimer);
            cycleMessages(); // 即座に1回目
            msgTimer = setInterval(cycleMessages, 8000);
        }

        function cycleMessages() {
            setGuideMessage(messages[msgIndex]);
            msgIndex = (msgIndex + 1) % messages.length;
        }

        function init() {
            updateUI();
            setupGlobalDrag();
            startMessageCycle();

            document.getElementById('btn-reset').onclick = () => {
                state = { a: { bits: [0,0,0,0], comp: false }, b: { bits: [0,0,0,0], comp: false } };
                document.querySelectorAll('.fixed-slot').forEach(s => { s.classList.remove('active'); s.textContent = ''; });
                updateUI();
            };
        }

        function calculateComplementBits(originalBits) {
            const inverted = originalBits.map(b => b === 0 ? 1 : 0);
            let val = parseInt(inverted.join(''), 2) + 1;
            return (val & 0xF).toString(2).padStart(BITS, '0').split('').map(Number);
        }

        function getSignedDecimal(bits) {
            const val = parseInt(bits.join(''), 2);
            return val >= 8 ? val - 16 : val;
        }

        function updateUI() {
            let isMagicMode = state.a.comp || state.b.comp;

            ['a', 'b'].forEach(key => {
                const s = state[key];
                const dBits = s.comp ? calculateComplementBits(s.bits) : s.bits;
                renderBits(`bits-${key}`, dBits, s.comp, key);
                
                const lens = document.getElementById(`lens-${key}`);
                const main = lens.querySelector('.lens-main');
                const sub = lens.querySelector('.lens-sub');
                if (s.comp) {
                    main.textContent = getSignedDecimal(dBits);
                    sub.textContent = "SIGNED";
                    lens.classList.add('magic-on');
                } else {
                    main.textContent = parseInt(dBits.join(''), 2);
                    sub.textContent = "NORMAL";
                    lens.classList.remove('magic-on');
                }
            });

            const valA = state.a.comp ? getSignedDecimal(calculateComplementBits(state.a.bits)) : parseInt(state.a.bits.join(''), 2);
            const valB = state.b.comp ? getSignedDecimal(calculateComplementBits(state.b.bits)) : parseInt(state.b.bits.join(''), 2);
            const sum = valA + valB;
            
            let hasOverflow = false;
            if (isMagicMode) {
                if (sum < -8 || sum > 7) hasOverflow = true;
            } else {
                if (sum > 15) hasOverflow = true;
            }

            const resVal = (sum >= 0 ? sum : 16 + sum) & 0xF;
            const resBits = resVal.toString(2).padStart(BITS, '0').split('').map(Number);
            renderBits('bits-res', resBits, isMagicMode && sum < 0, 'res');
            
            const resLensMain = document.querySelector('#lens-res .lens-main');
            const resValDisplay = isMagicMode ? (resVal >= 8 ? resVal - 16 : resVal) : (sum % 16);
            resLensMain.textContent = resValDisplay;

            const overflowNotice = document.getElementById('overflow-notice');
            if (hasOverflow) {
                overflowNotice.classList.add('visible');
            } else {
                overflowNotice.classList.remove('visible');
            }
        }

        function renderBits(id, bits, isMagic, rowKey) {
            const container = document.getElementById(id);
            container.innerHTML = '';
            bits.forEach((bit, i) => {
                const d = document.createElement('div');
                const isNegative = isMagic && i === 0 && bit === 1;
                d.className = `bit ${bit ? (isNegative ? 'negative-active' : 'active') : ''}`;
                let weight = Math.pow(2, BITS - 1 - i);
                if (i === 0 && isMagic) weight = -8;
                d.innerHTML = `<span class="bit-val">${bit}</span><span class="weight-label">${weight}</span>`;
                if (rowKey !== 'res') {
                    d.onclick = () => { 
                        state[rowKey].bits[i] = state[rowKey].bits[i] === 1 ? 0 : 1; 
                        updateUI();
                        // トリガー：ビット反転
                        setGuideMessage("「おお！君のビット操作で右の10進数の数、答えも変わったね。足し算している！」", true);
                    };
                }
                container.appendChild(d);
            });
        }

        function setupGlobalDrag() {
            let activeGhost = null;
            let sourceSlot = null;
            const toolboxItem = document.getElementById('u-comp');

            const startDrag = (e, source) => {
                const t = e.touches ? e.touches[0] : e;
                sourceSlot = source;
                activeGhost = toolboxItem.cloneNode(true);
                activeGhost.classList.add('dragging');
                document.body.appendChild(activeGhost);
                updateGhostPos(t.clientX, t.clientY);
                e.preventDefault();
            };

            const updateGhostPos = (x, y) => {
                if (activeGhost) {
                    activeGhost.style.left = (x - 30) + 'px';
                    activeGhost.style.top = (y - 30) + 'px';
                }
            };

            const onMove = (e) => {
                if (!activeGhost) return;
                const t = e.touches ? e.touches[0] : e;
                updateGhostPos(t.clientX, t.clientY);
            };

            const onEnd = (e) => {
                if (!activeGhost) return;
                const t = e.changedTouches ? e.changedTouches[0] : e;
                const x = t.clientX; const y = t.clientY;
                const slots = document.querySelectorAll('.fixed-slot');
                let droppedInSlot = null;

                slots.forEach(slot => {
                    const r = slot.getBoundingClientRect();
                    if (x > r.left && x < r.right && y > r.top && y < r.bottom) {
                        droppedInSlot = slot;
                    }
                });

                if (droppedInSlot) {
                    const target = droppedInSlot.dataset.target;
                    if (!state[target].comp) {
                        state[target].comp = true;
                        droppedInSlot.classList.add('active');
                        droppedInSlot.textContent = '🔄';
                        animateMagic(target);
                        // トリガー：補数器セット
                        setGuideMessage("「見事！君は2の補数を使って引き算を実現してしまったよ！」", true);
                    }
                } else if (sourceSlot) {
                    const target = sourceSlot.dataset.target;
                    state[target].comp = false;
                    sourceSlot.classList.remove('active');
                    sourceSlot.textContent = '';
                    updateUI();
                }

                document.body.removeChild(activeGhost);
                activeGhost = null;
                sourceSlot = null;
            };

            toolboxItem.addEventListener('touchstart', (e) => startDrag(e, null), {passive:false});
            toolboxItem.addEventListener('mousedown', (e) => startDrag(e, null));

            document.querySelectorAll('.fixed-slot').forEach(slot => {
                slot.addEventListener('touchstart', (e) => {
                    if (slot.classList.contains('active')) startDrag(e, slot);
                }, {passive:false});
                slot.addEventListener('mousedown', (e) => {
                    if (slot.classList.contains('active')) startDrag(e, slot);
                });
            });

            window.addEventListener('touchmove', onMove, {passive:false});
            window.addEventListener('mousemove', onMove);
            window.addEventListener('touchend', onEnd);
            window.addEventListener('mouseup', onEnd);
        }

        function animateMagic(target) {
            document.querySelectorAll(`#bits-${target} .bit`).forEach((el, i) => {
                setTimeout(() => { el.classList.add('flipping'); if (i === BITS - 1) setTimeout(() => updateUI(), 300); }, i * 50);
            });
        }
        
        init();
    </script>
</body>
</html>
